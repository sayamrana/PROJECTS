<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Aaduu ❤️</title>

<style>
*{
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}
body{
    margin:0;
    height:100vh;
    background:linear-gradient(135deg,#ff4e8a,#ff7eb3);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    transition:1s ease;
}

/* Photo appears AFTER YES */
body.show-photo{
    background:url("bg111.jpg") center/cover no-repeat;
}

/* Container */
.container{
    text-align:center;
    padding:20px;
    max-width:360px;
    width:100%;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(6px);
    border-radius:20px;
    color:white;
    transition:0.6s;
}

.container.transparent{
    background:transparent;
    backdrop-filter:none;
}

h1{
    font-size:1.8rem;
}

/* Buttons */
.buttons{
    margin-top:25px;
    position:relative;
    height:60px;
}

button{
    padding:12px 28px;
    border:none;
    border-radius:25px;
    font-size:1rem;
    cursor:pointer;
}

#yes{
    background:#ff2d55;
    color:white;
}

#no{
    background:white;
    color:#ff2d55;
    position:absolute;
    left:160px;
}

/* Envelope */
.envelope{
    display:none;
    margin:30px auto 0;
    width:260px;
    height:170px;
    position:relative;
    background:#ffccd5;
    border-radius:0 0 15px 15px;
    overflow:hidden;
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#ff8fab;
    clip-path:polygon(0 0,100% 0,50% 50%);
    transform-origin:top;
    transition:0.8s;
}

.letter{
    position:absolute;
    bottom:-100%;
    width:100%;
    height:100%;
    background:white;
    color:#ff2d55;
    padding:15px;
    text-align:center;
    transition:1s;
}

.envelope.open .flap{
    transform:rotateX(180deg);
}
.envelope.open .letter{
    bottom:0;
}

/* Hearts */
.heart{
    position:absolute;
    animation:float 6s linear infinite;
}
@keyframes float{
    0%{transform:translateY(100vh);opacity:1;}
    100%{transform:translateY(-10vh);opacity:0;}
}
</style>
</head>

<body>

<div class="container" id="box">
    <h1 id="question">💖 Aaduu 💖<br>Will You Be My Valentine?</h1>

    <div class="buttons">
        <button id="yes">Yes ❤️</button>
        <button id="no">No 💔</button>
    </div>

    <div class="envelope" id="envelope">
        <div class="flap"></div>
        <div class="letter">
            <p>
                My Aaduu ❤️<br><br>
                This moment is just the beginning  
                of all our beautiful memories.  
                <br><br>
                Happy Valentine’s 💕  
                <br>
                Always Yours 💌
            </p>
        </div>
    </div>
</div>

<audio id="song">
    <source src="song1.mp3">
</audio>

<script>
const noBtn=document.getElementById("no");
const yesBtn=document.getElementById("yes");
const envelope=document.getElementById("envelope");
const song=document.getElementById("song");
const question=document.getElementById("question");
const body=document.body;
const box=document.getElementById("box");

// No button escape
function moveNo(){
    noBtn.style.left=Math.random()*(window.innerWidth-80)+"px";
    noBtn.style.top=Math.random()*(window.innerHeight-40)+"px";
}
noBtn.addEventListener("mouseover",moveNo);
noBtn.addEventListener("touchstart",moveNo);

// YES click
yesBtn.addEventListener("click",()=>{
    question.style.display="none";
    yesBtn.style.display="none";
    noBtn.style.display="none";

    body.classList.add("show-photo");
    box.classList.add("transparent");

    envelope.style.display="block";
    setTimeout(()=>envelope.classList.add("open"),300);

    song.play();
});

// Hearts
function heart(){
    const h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=Math.random()*20+15+"px";
    h.style.animationDuration=Math.random()*3+3+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
}
setInterval(heart,350);
</script>

</body>
</html>
